upstream strapi_backend {
    server 127.0.0.1:1337;
    keepalive 32;
}

server {
    listen 80;
    server_name api.yengsang.com;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name cmsportal.yengsang.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.yengsang.com;

    ssl_certificate /etc/letsencrypt/live/api.yengsang.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yengsang.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    location /admin/ {
        return 301 https://cmsportal.yengsang.com$request_uri;
    }

    location / {
        proxy_pass http://strapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }
}

server {
    listen 443 ssl http2;
    server_name cmsportal.yengsang.com;

    ssl_certificate /etc/letsencrypt/live/cmsportal.yengsang.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cmsportal.yengsang.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    location = / {
        return 302 https://cmsportal.yengsang.com/admin/;
    }

    location / {
        proxy_pass http://strapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }
}
